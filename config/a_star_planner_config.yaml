a_star_node:
  ros__parameters:
    # Direction of path traversal (clockwise/anticlockwise)
    is_antiClockwise: false
    
    # Costmap topic subscription
    costmap_topic: "/inflated_costmap"
    
    # Input topics
    point_topic: "/clicked_point"
    visited_map_topic: "/visited_map"

    # Input marker topic for goal points
    marker_topic: "/astar_lookahead_marker"
    
    # Output path topic
    path_topic: "/pp_path"

    # Transform frames
    map_frame: "map"
    base_frame: "ego_racecar/base_link"

    # Heuristic type for path planning
    heuristic: "manhattan"  # options: "euclidean", "manhattan"

    # Path planning parameters
    planning:
      # Movement directions (4-connected or 8-connected)
      use_8_connected: true
      
      # Cost parameters
      base_movement_cost: 2    # cost for straight movement
      diagonal_movement_cost: 4  # for 8-connected
      
      # Obstacle rejection parameters
      reject_behind_robot: true

      interpolation_resolution: 0.35  # meters
      coordinates_tolerance: 1  # cells
      
    # Occupancy grid parameters
    occupancy:
      # Threshold for considering a cell as occupied
      occupied_threshold: 99
      
      # Threshold for considering a cell as free
      free_threshold: 0
    
    # Logging parameters
    log_level: "INFO"
